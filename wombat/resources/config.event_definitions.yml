# This file defines the building blocks of custom events.
# Each event is a sequence of fundamental operations.
#
# Allowed parameter enums:
#
# operation:
#   - apply_linear_change   — ramps a parameter linearly from start_value to end_value
#   - apply_modulation      — applies oscillating modulation to an axis
#
# axis:
#   - pulse_frequency       — pulse rate in Hz (normalized by normalization.pulse_frequency.max)
#   - pulse_width           — pulse width as percentage (normalized by normalization.pulse_width.max)
#   - frequency             — carrier frequency in Hz (normalized by normalization.frequency.max)
#   - volume                — main channel output level (0.0–1.0)
#   - volume-prostate       — prostate channel output level (0.0–1.0)
#   - alpha                 — alpha channel modulation parameter
#   - beta                  — beta channel modulation parameter
#   Multiple axes can be targeted simultaneously using comma separation (e.g. "volume,volume-prostate")
#
# waveform (apply_modulation only):
#   - sin                   — smooth sinusoidal oscillation
#   - square                — abrupt on/off switching; supports optional duty_cycle (0.0–1.0)
#
# mode:
#   - additive              — adds the effect on top of the current axis value
#   - overwrite             — replaces the current axis value entirely

# Axis normalization settings
# These define the maximum values used to normalize raw parameters to 0.0-1.0 range
normalization:
  pulse_frequency:
    max: 120.0          # Maximum pulse frequency in Hz
    unit: "Hz"
  pulse_width:
    max: 100.0          # Maximum pulse width (percentage)
    unit: "%"
  frequency:
    max: 1200.0          # Maximum frequency (degrees for restim)
    unit: "Hz"
  volume:
    max: 1.0            # Volume already normalized (0.0-1.0)
    unit: "normalized"

# Event groups for organization in the UI
# Each group can contain multiple event definitions with matching prefix
groups:
  - name: "General"
    prefix: ""
    description: "Mostly work in progress"

  - name: "MCB (credit: AquariumParrot)"
    prefix: "mcb_"
    description: "Events reverse-engineered from the Mistress and Control Box by AquariumParrot"

  - name: "Clutch (credit: AquariumParrot)"
    prefix: "clutch_"
    description: "Events reverse-engineered from the Clutch by AquariumParrot"
    
  - name: "Test events - use with care"
    prefix: "test_"
    description: "These events are for testing features of the app"

  - name: "CH events (for colored bars)"
    prefix: "CH_"
    description: "Events to be added to the ch for their colored bars"

