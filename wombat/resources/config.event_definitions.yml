  # === PULSE MODULATION ===
  # Modulate pulse width for textural changes

  clutch_pulse_wobble:
    default_params:
      duration_ms: 10000
      wobble_freq: 3          # Slow wobble
      wobble_amplitude: 5     # ±5% pulse width variation
      ramp_ms: 500

    steps:
      - operation: apply_modulation
        axis: pulse_width
        params:
          waveform: sin
          frequency: $wobble_freq
          amplitude: $wobble_amplitude
          max_level_offset: 0
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_ms
          ramp_out_ms: $ramp_ms
          mode: additive
